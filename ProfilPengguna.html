<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIK - Profil Pengguna</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col font-sans antialiased">

    <nav class="bg-[#3F2B1D] text-white py-4 px-6 md:px-16 flex justify-between items-center shadow-md z-20">
        <div class="text-3xl font-bold tracking-widest">
            SIDIK
        </div>
        
        <div class="hidden md:flex space-x-8 text-sm font-medium opacity-90">
            <a href="#" class="hover:text-amber-200 transition">Buku Panduan</a>
            <a href="#" class="hover:text-amber-200 transition">Pelatihan</a>
            <a href="#" class="hover:text-amber-200 transition">Klinik Pengetahuan</a>
            <a href="#" class="hover:text-amber-200 transition">Berbagi Pengetahuan</a>
        </div>

        <div class="md:hidden cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center py-12 px-6 md:px-16 w-full">
        
        <h2 class="text-3xl font-bold text-[#4A3728] mb-12 text-center tracking-wide">
            Profil Pengguna
        </h2>

        <div class="w-full max-w-3xl">
            <form action="#" method="POST" class="space-y-8">
                
                <div>
                    <label for="email" class="block text-[#4A3728] mb-2 font-medium text-lg">Alamat E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="w-full px-5 py-4 rounded-2xl bg-[#F4E5CF] text-[#4A3728] focus:outline-none focus:ring-2 focus:ring-[#65452C] transition-shadow border-none"
                        placeholder="Masukkan e-mail"
                    >
                </div>

                <div>
                    <label for="nama" class="block text-[#4A3728] mb-2 font-medium text-lg">Nama Lengkap</label>
                    <input 
                        type="text" 
                        id="nama" 
                        name="nama" 
                        class="w-full px-5 py-4 rounded-2xl bg-[#F4E5CF] text-[#4A3728] focus:outline-none focus:ring-2 focus:ring-[#65452C] transition-shadow border-none"
                        placeholder="Masukkan nama lengkap"
                    >
                </div>

                <div>
                    <label for="nip" class="block text-[#4A3728] mb-2 font-medium text-lg">NIP</label>
                    <input 
                        type="text" 
                        id="nip" 
                        name="nip" 
                        class="w-full px-5 py-4 rounded-2xl bg-[#F4E5CF] text-[#4A3728] focus:outline-none focus:ring-2 focus:ring-[#65452C] transition-shadow border-none"
                        placeholder="Masukkan NIP"
                    >
                </div>

                <div>
                    <label for="alamat" class="block text-[#4A3728] mb-2 font-medium text-lg">Alamat</label>
                    <input 
                        type="text" 
                        id="alamat" 
                        name="alamat" 
                        class="w-full px-5 py-4 rounded-2xl bg-[#F4E5CF] text-[#4A3728] focus:outline-none focus:ring-2 focus:ring-[#65452C] transition-shadow border-none"
                        placeholder="Masukkan alamat"
                    >
                </div>

            </form>
        </div>

    </main>

</body>
</html>
