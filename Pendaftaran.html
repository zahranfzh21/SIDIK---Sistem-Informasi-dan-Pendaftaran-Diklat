<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIDIK - Formulir Pendaftaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex flex-col font-sans antialiased relative">

    <nav class="bg-[#3F2B1D] text-white py-4 px-6 md:px-16 flex justify-between items-center shadow-md">
        <div class="text-3xl font-bold tracking-widest">SIDIK</div>
    </nav>

    <main class="flex-grow flex flex-col items-center pt-6 pb-12 px-6 w-full">
        
        <div class="w-full max-w-2xl flex items-center mb-6 relative">
            <a href="Pelatihan.html" class="absolute left-0 text-[#4A3728] hover:text-[#3F2B1D] p-2 rounded-full hover:bg-gray-100 transition duration-200" title="Kembali ke Daftar Pelatihan">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-7 h-7 md:w-8 md:h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
                </svg>
            </a>
            <h2 class="text-2xl font-bold text-[#4A3728] w-full text-center">Formulir Pendaftaran</h2>
        </div>

        <div class="w-full max-w-2xl bg-[#E6D7C2] p-8 rounded-2xl shadow-sm">
            <form id="formPendaftaran" class="space-y-5">
                
                <div>
                    <label class="block text-[#4A3728] font-semibold mb-2">Pelatihan Yang Diikuti</label>
                    <input type="text" id="pilihanPelatihan" class="w-full px-4 py-3 rounded-xl border-none bg-gray-100 font-bold text-[#3F2B1D] shadow-inner focus:outline-none" readonly>
                </div>

                <div>
                    <label class="block text-[#4A3728] font-semibold mb-2">Nama Lengkap</label>
                    <input type="text" id="namaDaftar" class="w-full px-4 py-3 rounded-xl border-none bg-white shadow-inner focus:outline-none focus:ring-2 focus:ring-[#3F2B1D]" placeholder="Masukkan nama lengkap Anda" required>
                </div>

                <div>
                    <label class="block text-[#4A3728] font-semibold mb-2">NIP / Nomor Identitas</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl border-none bg-white shadow-inner focus:outline-none focus:ring-2 focus:ring-[#3F2B1D]" placeholder="Masukkan NIP Anda" required>
                </div>

                <div>
                    <label class="block text-[#4A3728] font-semibold mb-2">Asal Instansi / Satuan Kerja</label>
                    <input type="text" class="w-full px-4 py-3 rounded-xl border-none bg-white shadow-inner focus:outline-none focus:ring-2 focus:ring-[#3F2B1D]" placeholder="Contoh: Kemenag Kota..." required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-[#3F2B1D] hover:bg-[#523927] text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200">
                        Kirim Pendaftaran
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="modalSukses" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-all duration-300">
            <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-green-100 mb-6 animate-bounce">
                <svg class="h-12 w-12 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            
            <h3 class="text-2xl font-bold text-gray-900 mb-2">Pendaftaran Berhasil!</h3>
            <p class="text-gray-600 text-sm mb-6">Data Anda telah berhasil terkirim ke sistem kami.</p>
            
            <p class="text-xs text-gray-400">Mengalihkan kembali ke halaman pelatihan...</p>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Ambil data otomatis dari login & halaman Pelatihan.html
            const namaTersimpan = localStorage.getItem('namaPengguna');
            if (namaTersimpan) {
                document.getElementById('namaDaftar').value = namaTersimpan;
            }

            const pelatihanTersimpan = localStorage.getItem('pelatihanDipilih');
            if (pelatihanTersimpan) {
                document.getElementById('pilihanPelatihan').value = pelatihanTersimpan;
            } else {
                document.getElementById('pilihanPelatihan').value = "Belum memilih pelatihan";
            }
        });

        // Logika ketika Tombol Kirim diklik
        document.getElementById('formPendaftaran').addEventListener('submit', function(event) {
            event.preventDefault(); // Mencegah halaman reload instan

            // 1. Tampilkan Pop-Up Centang Hijau
            const modal = document.getElementById('modalSukses');
            modal.classList.remove('hidden');

            // 2. Tahan selama 3 detik untuk memberikan efek animasi, lalu redirect otomatis ke Pelatihan.html
            setTimeout(() => {
                window.location.href = 'Pelatihan.html';
            }, 3000); 
        });
    </script>
</body>
</html>
